<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Customer Feedback Form</h2>

<form id="feedbackForm">
    <label>Name:</label>
    <input type="text" id="name" 
           onkeypress="validateText(event)"
           onmouseover="highlight(this)"
           onmouseout="removeHighlight(this)" required>

    <label>Email:</label>
    <input type="email" id="email"
           onkeypress="validateEmail(event)"
           onmouseover="highlight(this)"
           onmouseout="removeHighlight(this)" required>

    <label>Feedback:</label>
    <textarea id="feedback"
              onmouseover="highlight(this)"
              onmouseout="removeHighlight(this)" required></textarea>

    <button type="button" ondblclick="submitForm()">Submit</button>
</form>

<script src="script.js"></script>
</body>
</html>
